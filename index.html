<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Beauty Mentor AI • Camera Debug</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;color:#fff}
  .stage{position:fixed;inset:0;z-index:1}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

  #openCamera{
    position:fixed;top:20px;left:20px;z-index:9999;
    border:none;padding:12px 16px;border-radius:12px;
    background:#ff4fa0;color:#fff;font-size:14px
  }

  .panel{position:fixed;inset:0;background:#000;z-index:99999;display:none}
  .videoWrap{position:absolute;inset:0;overflow:hidden}
  video{width:100%;height:100%;object-fit:cover;background:#000}

  .faceFrame{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:70%;height:70%;border:3px solid rgba(255,255,255,.6);border-radius:40px;
  }

  .indicator{
    position:absolute;top:60px;left:50%;transform:translateX(-50%);
    padding:8px 14px;border-radius:30px;background:rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.2);font-size:14px;display:flex;gap:8px;align-items:center;
  }
  .dot{width:10px;height:10px;border-radius:50%;background:#ff4444}
  .indicator.ok .dot{background:#00ff7b}

  .controls{
    position:absolute;left:0;right:0;bottom:0;
    padding:15px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
    background:linear-gradient(transparent,rgba(0,0,0,.9));
  }
  button{
    border:none;padding:12px 16px;border-radius:12px;
    background:rgba(255,255,255,.10);color:#fff;font-size:14px;
  }
  .primary{background:#ff4fa0}
  .close{background:#ff4444}

  .result{
    position:absolute;left:12px;right:12px;bottom:90px;
    background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);
    border-radius:12px;padding:10px;max-height:38vh;overflow:auto;
    display:none;font-size:12px;white-space:pre-wrap;line-height:1.35;
  }
</style>
</head>

<body>

<div class="stage">
  <iframe
    src="https://embed.liveavatar.com/v1/8d2b6987-3ad8-49bc-860f-e6f00c939b8e"
    allow="camera; microphone; autoplay">
  </iframe>
</div>

<button id="openCamera">📷 Selfie</button>

<div class="panel" id="panel">
  <div class="videoWrap">
    <video id="video" autoplay muted playsinline webkit-playsinline></video>
    <div class="faceFrame"></div>
    <div class="indicator" id="indicator">
      <div class="dot"></div>
      <span id="indicatorText">Centra il volto</span>
    </div>
  </div>

  <div class="result" id="result"></div>

  <div class="controls">
    <button id="startCamera" class="primary">Avvia</button>
    <button id="close" class="close">Chiudi</button>
  </div>
</div>

<script>
  const panel = document.getElementById("panel");
  const openCamera = document.getElementById("openCamera");
  const startCameraBtn = document.getElementById("startCamera");
  const closeBtn = document.getElementById("close");
  const video = document.getElementById("video");
  const result = document.getElementById("result");

  const indicator = document.getElementById("indicator");
  const indicatorText = document.getElementById("indicatorText");

  let stream = null;

  function showBox(text){
    result.style.display = "block";
    result.textContent = text;
  }

  function stopCamera(){
    if(stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  openCamera.onclick = () => {
    panel.style.display = "block";
    indicator.classList.remove("ok");
    indicatorText.textContent = "Centra il volto";
    showBox(
      `DEBUG CAMERA\n\n` +
      `SecureContext (HTTPS): ${window.isSecureContext}\n` +
      `URL: ${location.href}\n\n` +
      `Premi "Avvia". Se fallisce vedrai un alert con il nome errore.\n` +
      `Tip: se sei in Instagram/FB/WhatsApp, apri in Safari/Chrome.\n`
    );
  };

  closeBtn.onclick = () => {
    stopCamera();
    panel.style.display = "none";
  };

  startCameraBtn.onclick = async () => {
    showBox("Richiesta permesso camera…");

    if (!window.isSecureContext) {
      showBox(
        "❌ BLOCCO SICUREZZA: pagina NON in HTTPS (secure context = false)\n\n" +
        "Soluzione: apri questa pagina su Vercel (https://...) oppure localhost.\n"
      );
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showBox("❌ getUserMedia non disponibile in questo browser/webview.\nApri in Safari/Chrome vero.");
      return;
    }

    try {
      stopCamera();

      const constraints = {
        audio: false,
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      };

      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;

      // iOS: force play
      await video.play().catch(()=>{});

      indicator.classList.add("ok");
      indicatorText.textContent = "Camera attiva";
      showBox("✅ Camera avviata correttamente.\n\nSe ancora non vedi il video, prova ad aprire in Safari/Chrome e controlla i permessi del sito.");
    } catch (err) {
      console.error(err);

      // ✅ MODIFICA RICHIESTA: alert con errore reale
      alert("ERRORE CAMERA: " + (err?.name || "unknown") + " | " + (err?.message || ""));

      showBox(
        "❌ ERRORE CAMERA\n\n" +
        "name: " + (err?.name || "unknown") + "\n" +
        "message: " + (err?.message || "") + "\n\n" +
        "Soluzioni:\n" +
        "1) Lucchetto → Impostazioni sito → Fotocamera → Consenti\n" +
        "2) Apri in Safari/Chrome (non browser in-app)\n" +
        "3) Assicurati che sia HTTPS\n" +
        "4) Chiudi altre app che usano la camera\n"
      );
    }
  };

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopCamera();
  });
</script>

</body>
</html>
