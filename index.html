<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Beauty Mentor • D-ID Agent + Selfie PRO</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      position: fixed;
      touch-action: manipulation;
      overscroll-behavior: none;
      color:#fff;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      position: relative;
    }

    .frame {
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      background: #000;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.85);
      font-size: 14px;
      letter-spacing: .2px;
      user-select: none;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,.06), rgba(0,0,0,.85));
      z-index: 2;
    }

    .topUI{
      position:fixed;
      top:12px;
      left:12px;
      z-index:9999;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      max-width:calc(100vw - 24px);
    }
    .btn{
      border:none;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.14);
      color:#fff;
      font-size:14px;
      cursor:pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .btn.primary{ background:rgba(255,79,160,0.75); border-color:rgba(255,79,160,0.95); }
    .btn.danger{ background:rgba(255,60,60,0.55); border-color:rgba(255,60,60,0.80); }
    .btn:disabled{opacity:0.55;cursor:not-allowed;}

    /* CAMERA OVERLAY */
    .camOverlay{position:fixed;inset:0;z-index:99999;background:#000;display:none;}
    .camHeader{
      position:absolute;top:0;left:0;right:0;z-index:5;
      display:flex;justify-content:space-between;align-items:center;
      padding:12px;padding-top:calc(12px + env(safe-area-inset-top));
      background:linear-gradient(to bottom, rgba(0,0,0,0.78), rgba(0,0,0,0.25));
      border-bottom:1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
      font-weight:800;
    }

    .viewport{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .videoWrap{
      position:relative;
      width:min(100vw, calc(100dvh * 9 / 16));
      height:min(100dvh, calc(100vw * 16 / 9));
      aspect-ratio:9/16;
      overflow:hidden;background:#000;border-radius:18px;border:1px solid rgba(255,255,255,0.12);
    }
    @media (max-aspect-ratio: 9/16){
      .videoWrap{width:100vw;height:100dvh;border-radius:0;border:none;}
    }
    video,canvas{width:100%;height:100%;object-fit:cover;display:block}

    .faceFrame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
    .frameShape{width:72%;height:78%;border:2px solid rgba(255,255,255,0.55);border-radius:46px;box-shadow: 0 0 0 9999px rgba(0,0,0,0.18);}
    .hintText{position:absolute;bottom:96px;left:12px;right:12px;text-align:center;font-size:12px;opacity:0.92;}

    .faceBox{
      position:absolute;border:2px solid rgba(255,79,160,0.95);
      border-radius:14px;display:none;pointer-events:none;
      box-shadow:0 0 18px rgba(255,79,160,0.35);
    }

    .centerIndicator{
      position:absolute;top:calc(64px + env(safe-area-inset-top));
      left:50%;transform:translateX(-50%);z-index:6;
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 12px;border-radius:999px;
      background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
      font-size:13px;font-weight:700;
    }
    .dot{width:10px;height:10px;border-radius:999px;background:rgba(255,120,120,0.95);box-shadow:0 0 14px rgba(255,120,120,0.45);}
    .centerIndicator.ok .dot{background:rgba(120,255,160,0.95);box-shadow:0 0 14px rgba(120,255,160,0.45);}

    .sheet{
      position:absolute;left:12px;right:12px;
      bottom:calc(150px + env(safe-area-inset-bottom));
      z-index:7;max-height:32dvh;overflow:auto;
      padding:10px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.50);
      backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
      display:none;white-space:pre-wrap;font-size:12px;line-height:1.35;
    }

    .pasteBox{
      position:absolute;left:12px;right:12px;
      bottom:calc(92px + env(safe-area-inset-bottom));
      z-index:8;
      display:flex;flex-direction:column;gap:8px;
    }
    .pasteHint{
      font-size:12px;opacity:0.92;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:14px;padding:10px;
      backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
    }
    textarea{
      width:100%;
      min-height:90px;
      max-height:180px;
      resize:none;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:12px;
      outline:none;
    }

    .camControls{
      position:absolute;left:0;right:0;bottom:0;z-index:9;
      padding:12px;padding-bottom:calc(12px + env(safe-area-inset-bottom));
      background:linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0.22));
      border-top:1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
    }
    .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

    /* MODAL RISULTATO */
    .resultModal{
      position:fixed;inset:0;z-index:999999;
      background:rgba(0,0,0,0.68);
      display:none;
      align-items:center;
      justify-content:center;
      padding:14px;
    }
    .resultCard{
      width:min(760px, 100%);
      max-height:86dvh;
      overflow:hidden;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(0,0,0,0.74);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:0 12px 40px rgba(0,0,0,0.55);
      display:flex;
      flex-direction:column;
    }
    .resultHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,0.12);
      font-weight:900;
    }
    .resultBody{
      padding:12px;
      overflow:auto;
    }
    .pillRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .pill{
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.12);
    }
    .sectionTitle{
      font-size:13px;
      font-weight:900;
      margin:12px 0 6px;
      opacity:.95;
    }
    .box{
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      padding:10px;
      white-space:pre-wrap;
      font-size:12px;
      line-height:1.35;
    }
    .resultFooter{
      padding:12px;
      border-top:1px solid rgba(255,255,255,0.12);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .toast{
      position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
      z-index:9999999;background:rgba(0,0,0,0.74);
      border:1px solid rgba(255,255,255,0.14);
      padding:10px 12px;border-radius:999px;font-size:13px;display:none;
      backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
    }

    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>

  <script>
    /* ====== iframe behaviors ====== */
    const agentFrame = document.getElementById('agentFrame');
    const loading = document.getElementById('loading');

    agentFrame.addEventListener('load', () => {
      if (loading) loading.style.display = 'none';
    });

    // ✅ FIX ANTI-RESET:
    // - Disattivo fullscreen automatico: può resettare la sessione dell’iframe D-ID su iOS/Android
    // - Disattivo anche il blocco "double tap preventDefault": può interferire con i click interni dell’iframe
    //
    // (Se vuoi fullscreen, meglio farlo con un bottone dedicato esterno, non al primo tap)
    //
    // function requestFs() { ... }
    // window.addEventListener('touchstart', requestFs, { once: true, passive: true });
    // window.addEventListener('click', requestFs, { once: true });
    //
    // let lastTouchEnd = 0;
    // document.addEventListener('touchend', (event) => { ... }, { passive: false });

    /* ====== Camera + Analysis ====== */
    const camOverlay = document.getElementById('camOverlay');
    const toast = document.getElementById('toast');

    const openCamBtn = document.getElementById('openCamBtn');
    const closeCamBtn = document.getElementById('closeCamBtn');

    const startBtn = document.getElementById('startBtn');
    const snapBtn = document.getElementById('snapBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');

    const copyBtn = document.getElementById('copyBtn');
    const openChatPasteBtn = document.getElementById('openChatPasteBtn');

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const sheet = document.getElementById('sheet');

    const faceBoxEl = document.getElementById('faceBox');
    const centerIndicator = document.getElementById('centerIndicator');
    const centerText = document.getElementById('centerText');

    const reportInput = document.getElementById('reportInput');
    const usePastedBtn = document.getElementById('usePastedBtn');
    const clearPastedBtn = document.getElementById('clearPastedBtn');

    // Modal risultato
    const resultModal = document.getElementById('resultModal');
    const resultCloseBtn = document.getElementById('resultCloseBtn');
    const resultCopyBtn = document.getElementById('resultCopyBtn');
    const resultOpenAvatarBtn = document.getElementById('resultOpenAvatarBtn');
    const pillRow = document.getElementById('pillRow');
    const resultSummaryBox = document.getElementById('resultSummaryBox');
    const resultChatBox = document.getElementById('resultChatBox');

    let stream = null;
    let detector = null;
    let lastFace = null;
    let faceOk = false;

    let lastChatText = "";
    let lastPayload = null;

    function showToast(msg){
      toast.textContent = msg;
      toast.style.display = 'block';
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=> toast.style.display='none', 2200);
    }

    function setCenter(ok, txt){
      centerIndicator.classList.toggle('ok', !!ok);
      centerText.textContent = txt;
    }

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    openCamBtn.onclick = () => {
      camOverlay.style.display = 'block';
      sheet.style.display = 'none';
      setCenter(false, "Centra il volto");
    };

    closeCamBtn.onclick = () => {
      stopCamera();
      camOverlay.style.display = 'none';
    };

    function stopCamera(){
      if(stream){
        stream.getTracks().forEach(t=>t.stop());
        stream = null;
      }
      snapBtn.disabled = true;
      analyzeBtn.disabled = true;
      lastFace = null;
      faceOk = false;
      faceBoxEl.style.display = 'none';
      setCenter(false, "Centra il volto");
    }

    function getFaceDetectionCtor(){
      if (typeof window.FaceDetection === "function") return window.FaceDetection;
      if (window.FaceDetection && typeof window.FaceDetection.FaceDetection === "function") return window.FaceDetection.FaceDetection;
      return null;
    }

    function initDetector(){
      if(detector) return detector;

      const Ctor = getFaceDetectionCtor();
      if(!Ctor) throw new Error("FaceDetection constructor not found");

      detector = new Ctor({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${file}`
      });

      detector.setOptions({ model:"short", minDetectionConfidence:0.6 });

      detector.onResults((results)=>{
        const dets = results?.detections || [];
        if(!dets.length){
          lastFace = null;
          faceOk = false;
          faceBoxEl.style.display = 'none';
          setCenter(false, "Centra il volto");
          return;
        }
        const bb = dets[0].boundingBox;
        const xMin = bb.xCenter - bb.width/2;
        const yMin = bb.yCenter - bb.height/2;

        lastFace = {
          xMin: clamp(xMin, 0, 1),
          yMin: clamp(yMin, 0, 1),
          width: clamp(bb.width, 0, 1),
          height: clamp(bb.height, 0, 1)
        };

        const area = lastFace.width * lastFace.height;
        faceOk = area > 0.08;

        setCenter(faceOk, faceOk ? "Volto centrato" : "Avvicina il volto");
        drawFaceBoxOverlay();
      });

      return detector;
    }

    async function detectionLoop(){
      if(!stream) return;
      try{ await detector.send({ image: video }); }catch{}
      requestAnimationFrame(detectionLoop);
    }

    function drawFaceBoxOverlay(){
      if(!lastFace){ faceBoxEl.style.display='none'; return; }
      const wrap = video.parentElement;
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;

      faceBoxEl.style.display = 'block';
      faceBoxEl.style.left = (lastFace.xMin * w) + "px";
      faceBoxEl.style.top = (lastFace.yMin * h) + "px";
      faceBoxEl.style.width = (lastFace.width * w) + "px";
      faceBoxEl.style.height = (lastFace.height * h) + "px";
    }

    startBtn.onclick = async () => {
      try{
        if(!window.isSecureContext){
          sheet.style.display='block';
          sheet.textContent = "La camera richiede HTTPS (Vercel).";
          return;
        }

        stream = await navigator.mediaDevices.getUserMedia({
          audio:false,
          video:{ facingMode:"user", width:{ ideal:1280 }, height:{ ideal:720 } }
        });

        video.srcObject = stream;
        await video.play().catch(()=>{});

        initDetector();
        snapBtn.disabled = false;
        analyzeBtn.disabled = true;

        showToast("Camera attiva ✅");
        requestAnimationFrame(detectionLoop);
      }catch(err){
        console.error(err);
        sheet.style.display='block';
        sheet.textContent = "ERRORE CAMERA: " + (err?.message || err);
      }
    };

    snapBtn.onclick = () => {
      if(!stream || !video.videoWidth) return;

      const W=900, H=1600;
      canvas.width=W; canvas.height=H;
      const ctx = canvas.getContext('2d');

      const vw = video.videoWidth, vh = video.videoHeight;
      const targetAR = W/H, videoAR = vw/vh;
      let sx=0,sy=0,sw=vw,sh=vh;
      if(videoAR > targetAR){
        sh = vh; sw = Math.round(vh * targetAR); sx = Math.round((vw - sw)/2);
      }else{
        sw = vw; sh = Math.round(vw / targetAR); sy = Math.round((vh - sh)/2);
      }
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, W, H);

      if(!lastFace){
        sheet.style.display='block';
        sheet.textContent = "Volto non rilevato. Inquadra il viso nella cornice.";
        analyzeBtn.disabled = true;
        showToast("Volto non rilevato ❌");
        return;
      }
      if(!faceOk){
        sheet.style.display='block';
        sheet.textContent = "Volto troppo lontano. Avvicinati un po’.";
        analyzeBtn.disabled = true;
        showToast("Avvicina il volto 📏");
        return;
      }

      analyzeBtn.disabled = false;
      showToast("Scatto OK 📸");
    };

    function cropFaceDataURL(){
      const W = canvas.width, H = canvas.height;

      let x = lastFace.xMin * W;
      let y = lastFace.yMin * H;
      let w = lastFace.width * W;
      let h = lastFace.height * H;

      const padX = w * 0.20;
      const padY = h * 0.35;

      x = clamp(x - padX, 0, W-1);
      y = clamp(y - padY, 0, H-1);
      w = clamp(w + padX*2, 1, W - x);
      h = clamp(h + padY*2, 1, H - y);

      const out = document.createElement('canvas');
      const outW = 720;
      const outH = clamp(Math.round(outW * (h / w)), 720, 960);
      out.width = outW; out.height = outH;

      const octx = out.getContext('2d');
      octx.drawImage(canvas, x, y, w, h, 0, 0, out.width, out.height);

      return out.toDataURL('image/jpeg', 0.78);
    }

    function buildChatTextFromAnalysisPayload(payload){
      const summary = payload?.summary || {};
      return [
        "Ciao! Ho appena fatto un’analisi Beauty Mentor. Vorrei una routine personalizzata (senza consigli medici):",
        "",
        `• Beauty Score: ${payload?.beauty_score ?? "--"}/100`,
        `• Tipo pelle: ${summary.skin_type ?? "--"}`,
        `• Osservazioni: ${(summary.concerns || []).join(", ") || "--"}`,
        summary.notes ? `• Note: ${summary.notes}` : "",
        "",
        "Mi prepari:",
        "1) Routine MATTINA (step + texture/prodotti consigliati)",
        "2) Routine SERA",
        "3) 1-2 consigli makeup naturali",
        "4) 1-2 consigli cute/capelli in base al report",
      ].filter(Boolean).join("\n");
    }

    function buildSummaryText(payload){
      const s = payload?.summary || {};
      const score = payload?.beauty_score ?? "--";
      const concerns = (s.concerns || []).map(x => `- ${x}`).join("\n") || "- —";
      return [
        `Beauty Score: ${score}/100`,
        `Tipo pelle: ${s.skin_type ?? "—"}`,
        "",
        "Osservazioni:",
        concerns,
        "",
        s.notes ? `Note: ${s.notes}` : ""
      ].filter(Boolean).join("\n");
    }

    function buildPastedPrompt(txt){
      return (
        "Ciao! Non puoi vedere direttamente la foto, ma puoi leggere questo REPORT.\n" +
        "Per favore: estrai le info e dammi una routine skincare + capelli + makeup (stile elegante, professionale, niente consigli medici).\n\n" +
        "REPORT:\n" + txt
      );
    }

    function openResultModal(){
      pillRow.innerHTML = "";
      const score = (lastPayload && typeof lastPayload.beauty_score !== "undefined") ? `${lastPayload.beauty_score}/100` : "—";
      const type = lastPayload?.summary?.skin_type || "—";
      const pills = [
        { t: `Beauty Score: ${score}` },
        { t: `Pelle: ${type}` }
      ];
      pills.forEach(p => {
        const el = document.createElement("div");
        el.className = "pill";
        el.textContent = p.t;
        pillRow.appendChild(el);
      });

      resultSummaryBox.textContent = lastPayload ? buildSummaryText(lastPayload) : "—";
      resultChatBox.textContent = lastChatText || "—";
      resultModal.style.display = "flex";
    }

    analyzeBtn.onclick = async () => {
      try{
        analyzeBtn.disabled = true;
        showToast("Analisi…");

        const faceDataUrl = cropFaceDataURL();

        const resp = await fetch("/api/analyze-skin", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            image_data_url: faceDataUrl,
            lang: document.documentElement.lang || "it"
          })
        });

        if(!resp.ok){
          const t = await resp.text();
          throw new Error(t || "Errore API");
        }

        const payload = await resp.json();
        lastPayload = payload;

        lastChatText = buildChatTextFromAnalysisPayload(payload);

        copyBtn.disabled = false;
        openChatPasteBtn.disabled = false;

        openResultModal();
        showToast("Analisi completata ✅");

      }catch(err){
        console.error(err);
        sheet.style.display='block';
        sheet.textContent = "Errore analisi: " + (err?.message || err);
        showToast("Errore analisi ❌");
      }finally{
        analyzeBtn.disabled = false;
      }
    };

    usePastedBtn.onclick = () => {
      const txt = (reportInput.value || "").trim();
      if(!txt){
        showToast("Incolla un report ✍️");
        return;
      }
      lastPayload = null;
      lastChatText = buildPastedPrompt(txt);

      copyBtn.disabled = false;
      openChatPasteBtn.disabled = false;

      pillRow.innerHTML = "";
      const el = document.createElement("div");
      el.className = "pill";
      el.textContent = "Report incollato";
      pillRow.appendChild(el);

      resultSummaryBox.textContent = "Sintesi: report incollato (nessun JSON strutturato).";
      resultChatBox.textContent = lastChatText;

      resultModal.style.display = "flex";
      showToast("Testo pronto ✅");
    };

    clearPastedBtn.onclick = () => {
      reportInput.value = "";
      showToast("Svuotato");
    };

    copyBtn.onclick = async () => {
      try{
        await navigator.clipboard.writeText(lastChatText || "");
        showToast("Copiato 📋");
      }catch{
        showToast("Copia non riuscita");
      }
    };

    openChatPasteBtn.onclick = () => {
      if(!lastChatText){ showToast("Nessun testo pronto"); return; }
      openResultModal();
    };

    // Modal actions
    resultCloseBtn.onclick = () => { resultModal.style.display = "none"; };

    resultCopyBtn.onclick = async () => {
      try{
        await navigator.clipboard.writeText(lastChatText || "");
        showToast("Copiato 📋");
      }catch{
        showToast("Copia non riuscita");
      }
    };

    // ✅ FIX ANTI-RESET:
    // - NON facciamo agentFrame.focus()
    // - chiudiamo overlay con un piccolo delay
    resultOpenAvatarBtn.onclick = async () => {
      try{
        await navigator.clipboard.writeText(lastChatText || "");
      }catch(e){}

      resultModal.style.display = "none";

      // Delay per evitare “reload/reset” dell’iframe su molti telefoni
      setTimeout(() => {
        camOverlay.style.display = "none";
      }, 350);

      showToast("Testo copiato ✅ Apri la chat dell’avatar e incolla 💬");
    };

    resultModal.addEventListener("click", (e) => {
      if(e.target === resultModal) resultModal.style.display = "none";
    });

    document.addEventListener("visibilitychange", () => {
      if(document.hidden){
        stopCamera();
      }
    });
  </script>
</body>
</html>
