<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Beauty Mentor AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
background:black;
overflow:hidden;
color:white;
}

/* AVATAR */

.stage{
position:fixed;
inset:0;
z-index:1;
}

iframe{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100vw;
height:100vh;
border:none;
}

/* CAMERA PANEL */

.panel{
position:fixed;
inset:0;
background:black;
z-index:9999;
display:none;
}

.videoWrap{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* FACE FRAME */

.faceFrame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
height:70%;
border:3px solid rgba(255,255,255,0.6);
border-radius:40px;
}

/* FACE BOX */

.faceBox{
position:absolute;
border:2px solid #ff4fa0;
border-radius:12px;
display:none;
}

/* INDICATOR */

.indicator{

position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
padding:8px 14px;
border-radius:30px;
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.2);
font-size:14px;
display:flex;
align-items:center;
gap:8px;

}

.dot{

width:10px;
height:10px;
border-radius:100%;
background:red;

}

.indicator.ok .dot{
background:#00ff7b;
}

/* CONTROLS */

.controls{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:15px;
display:flex;
justify-content:center;
gap:10px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

button{

border:none;
padding:12px 16px;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
font-size:14px;
}

.primary{
background:#ff4fa0;
}

.close{
background:#ff4444;
}

.result{

position:absolute;
bottom:90px;
left:12px;
right:12px;
background:rgba(0,0,0,0.6);
border-radius:12px;
padding:10px;
max-height:30vh;
overflow:auto;
display:none;
font-size:12px;

}

</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>

</head>

<body>

<div class="stage">

<iframe
src="https://embed.liveavatar.com/v1/8d2b6987-3ad8-49bc-860f-e6f00c939b8e"
allow="camera;microphone;autoplay">
</iframe>

</div>

<button id="openCamera" style="position:fixed;top:20px;left:20px;z-index:9999">
📷 Selfie
</button>

<div class="panel" id="panel">

<div class="videoWrap">

<video id="video" autoplay playsinline webkit-playsinline muted></video>

<div class="faceFrame"></div>

<div class="faceBox" id="faceBox"></div>

<div class="indicator" id="indicator">
<div class="dot"></div>
<span id="indicatorText">Centra il volto</span>
</div>

</div>

<div class="result" id="result"></div>

<div class="controls">

<button id="startCamera">Avvia</button>

<button id="snap">Scatta</button>

<button id="analyze" class="primary">Analizza</button>

<button id="close" class="close">Chiudi</button>

</div>

</div>

<script>

const panel=document.getElementById("panel")
const openCamera=document.getElementById("openCamera")

const startCamera=document.getElementById("startCamera")
const snap=document.getElementById("snap")
const analyze=document.getElementById("analyze")
const close=document.getElementById("close")

const video=document.getElementById("video")
const canvas=document.createElement("canvas")

const faceBox=document.getElementById("faceBox")

const indicator=document.getElementById("indicator")
const indicatorText=document.getElementById("indicatorText")

const result=document.getElementById("result")

let stream=null
let detector=null
let lastFace=null

function showError(e){

result.style.display="block"

result.textContent=
"Errore camera:\n\n"+e.name+"\n"+e.message+"\n\nUsa HTTPS e abilita la camera nel browser."

}

openCamera.onclick=()=>panel.style.display="block"

close.onclick=()=>{

panel.style.display="none"

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

}

startCamera.onclick=async()=>{

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"},
audio:false
})

video.srcObject=stream

initDetector()

}catch(e){

showError(e)

}

}

function initDetector(){

detector=new FaceDetection.FaceDetection({

locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`

})

detector.setOptions({
model:"short",
minDetectionConfidence:0.6
})

detector.onResults(results=>{

if(!results.detections.length){

faceBox.style.display="none"
indicator.classList.remove("ok")
indicatorText.textContent="Centra il volto"
lastFace=null

return

}

let bb=results.detections[0].boundingBox

lastFace=bb

indicator.classList.add("ok")
indicatorText.textContent="Volto centrato"

drawBox(bb)

})

loop()

}

function loop(){

if(!stream)return

detector.send({image:video})

requestAnimationFrame(loop)

}

function drawBox(bb){

let vw=video.clientWidth
let vh=video.clientHeight

let x=bb.xCenter*vw-(bb.width*vw)/2
let y=bb.yCenter*vh-(bb.height*vh)/2

let w=bb.width*vw
let h=bb.height*vh

faceBox.style.display="block"
faceBox.style.left=x+"px"
faceBox.style.top=y+"px"
faceBox.style.width=w+"px"
faceBox.style.height=h+"px"

}

snap.onclick=()=>{

canvas.width=900
canvas.height=1600

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0,canvas.width,canvas.height)

}

analyze.onclick=async()=>{

if(!lastFace){

result.style.display="block"
result.textContent="Volto non rilevato"

return

}

let img=canvas.toDataURL("image/jpeg",0.8)

result.style.display="block"
result.textContent="Analisi in corso..."

try{

let r=await fetch("/api/analyze-skin",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

image_data_url:img

})

})

let data=await r.json()

result.textContent=JSON.stringify(data,null,2)

}catch(e){

result.textContent="Errore analisi"

}

}

</script>

</body>
</html>
